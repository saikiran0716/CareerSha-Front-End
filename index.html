            var siteUrl = 'https://www.careersha.com';

            var ensureMeta = function (selector, attribute, key, content) {
                var element = document.head.querySelector(selector);
                if (!element) {

                fetch(cmsApiUrl, { mode: 'cors' })

                        if (!response.ok) throw new Error('Article not found');
                        return response.json();
                    })
                    .then(function (article) {

                        var canonicalUrl = article.canonical_url || (siteUrl + path);
                        
                        setPageMetadata(seoTitle, seoDescription, canonicalUrl);
                    })
                    .catch(function () {

                    break;

    <style id="initial-loader-css">
        :root {
            --brand-primary: #4f46e5;
            --brand-secondary: #a855f7;
            --bg-white: #ffffff;
            --text-slate: #0f172a;
        }

        .initial-loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-white);
            z-index: 9999;
            font-family: 'Inter', system-ui, sans-serif;
            transition: opacity 0.5s ease-out;
        }

        .loader-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: simpleFadeIn 0.8s ease-out;
        }

        .rings-container {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring-active {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #f1f5f9;
            border-top-color: var(--brand-primary);
            animation: rotate 1.2s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
        }

        .ring-active:nth-child(2) {
            width: 65%;
            height: 65%;
            border-color: #f1f5f9;
            border-bottom-color: var(--brand-secondary);
            animation: rotate 1.8s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite reverse;
        }

        .core-elite {
            width: 12px;
            height: 12px;
            background: var(--brand-primary);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.3);
            animation: softPulse 1.5s ease-in-out infinite;
        }

        .brand-elite {
            margin-top: 2rem;
            text-align: center;
        }

        .brand-h {
            font-size: 24px;
            font-weight: 600;
            /* Semi-bold */
            letter-spacing: -0.02em;
            color: var(--text-slate);
        }

        .brand-tag {
            font-size: 14px;
            color: #64748b;
            margin-top: 0.5rem;
            font-weight: 400;
            /* Regular */
            opacity: 0.8;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes softPulse {

            0%,
            100% {
                transform: scale(0.9);
                opacity: 0.6;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        @keyframes simpleFadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
