    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfdfe;
            color: #0f172a;
            scroll-behavior: smooth;
        }

        .dark body {
            background-color: #020617;
            color: #f1f5f9;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-bottom: 1px solid rgba(226, 232, 240, 0.5);
        }

        .dark .glass-nav {
            background: rgba(2, 6, 23, 0.7);
            border-bottom: 1px solid rgba(30, 41, 59, 0.5);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade {
            animation: fadeIn 0.5s ease-out forwards;
        }

        .animate-slide {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .premium-card {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .dark .premium-card {
            border: 1px solid rgba(30, 41, 59, 0.8);
        }

        .premium-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -12px rgba(79, 105, 223, 0.15);
        }

        .nav-link {
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: #4f69df;
            transition: width 0.3s ease;
        }

        .nav-link.active {
            color: #4f69df;
        }

        .nav-link.active::after {
            width: 100%;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(226, 232, 240, 0.4);
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .dark ::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.4);
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        .dark ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        /* Glassmorphism Utilities */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
    <style id="initial-loader-css">
        :root {
            --brand-primary: #4f46e5;
            --brand-secondary: #a855f7;
            --bg-white: #ffffff;
            --text-slate: #0f172a;
        }

        .initial-loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-white);
            z-index: 9999;
            font-family: 'Inter', system-ui, sans-serif;
            transition: opacity 0.5s ease-out;
        }

        .loader-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: simpleFadeIn 0.8s ease-out;
        }

        .rings-container {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring-active {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #f1f5f9;
            border-top-color: var(--brand-primary);
            animation: rotate 1.2s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
        }

        .ring-active:nth-child(2) {
            width: 65%;
            height: 65%;
            border-color: #f1f5f9;
            border-bottom-color: var(--brand-secondary);
            animation: rotate 1.8s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite reverse;
        }

        .core-elite {
            width: 12px;
            height: 12px;
            background: var(--brand-primary);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.3);
            animation: softPulse 1.5s ease-in-out infinite;
        }

        .brand-elite {
            margin-top: 2rem;
            text-align: center;
        }

        .brand-h {
            font-size: 24px;
            font-weight: 600;
            /* Semi-bold */
            letter-spacing: -0.02em;
            color: var(--text-slate);
        }

        .brand-tag {
            font-size: 14px;
            color: #64748b;
            margin-top: 0.5rem;
            font-weight: 400;
            /* Regular */
            opacity: 0.8;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes softPulse {

            0%,
            100% {
                transform: scale(0.9);
                opacity: 0.6;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        @keyframes simpleFadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
